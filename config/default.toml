[general]
log_level = "info"
data_dir = "./data"
monitor_socket_path = "/tmp/polyalpha.sock"

[audit]
enabled = true
snapshot_interval_secs = 15
checkpoint_interval_secs = 60
warehouse_sync_interval_secs = 300
raw_segment_max_bytes = 67108864

[polymarket]
clob_api_url = "https://clob.polymarket.com"
ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
chain_id = 137

[binance]
rest_url = "https://fapi.binance.com"
ws_url = "wss://fstream.binance.com"

[deribit]
rest_url = "https://www.deribit.com/api/v2"
ws_url = "wss://www.deribit.com/ws/api/v2"

[okx]
rest_url = "https://www.okx.com"
ws_public_url = "wss://ws.okx.com:8443/ws/v5/public"
ws_private_url = "wss://ws.okx.com:8443/ws/v5/private"

[strategy.basis]
entry_z_score_threshold = 4.0
exit_z_score_threshold = 0.5
rolling_window_secs = 36000
min_warmup_samples = 600
min_basis_bps = 50.0
max_position_usd = 200.0
max_open_instant_loss_pct_of_budget = 0.01
delta_rebalance_threshold = 0.05
delta_rebalance_interval_secs = 60
band_policy = "configured_band"
min_poly_price = 0.2
max_poly_price = 0.5
max_data_age_minutes = 1
max_time_diff_minutes = 1
enable_freshness_check = true
reject_on_disconnect = true

[strategy.market_scope]
allow_terminal_above_markets = true
allow_terminal_below_markets = true
allow_terminal_between_markets = true
allow_path_dependent_touch_markets = false
allow_all_time_high_markets = false
allow_non_price_event_markets = false

[strategy.basis.overrides]

[strategy.basis.overrides.btc]
min_poly_price = 0.10
max_poly_price = 0.45

[strategy.basis.overrides.eth]
min_poly_price = 0.14
max_poly_price = 0.65
entry_z_score_threshold = 4.0
rolling_window_secs = 21600
min_warmup_samples = 360
exit_z_score_threshold = 0.6

[strategy.basis.overrides.sol]
min_poly_price = 0.24
max_poly_price = 0.65
entry_z_score_threshold = 4.0
rolling_window_secs = 36000
exit_z_score_threshold = 0.6

[strategy.basis.overrides.xrp]
min_poly_price = 0.06
max_poly_price = 0.65

[strategy.market_data]
mode = "ws"
max_stale_ms = 5000
poly_open_max_quote_age_ms = 3000
cex_open_max_quote_age_ms = 1000
close_max_quote_age_ms = 5000
max_cross_leg_skew_ms = 2500
borderline_poly_quote_age_ms = 1500
reconnect_backoff_ms = 1000
snapshot_refresh_secs = 300
funding_poll_secs = 60

[strategy.dmm]
gamma = 0.1
sigma_window_secs = 300
max_inventory = 5000.0
order_refresh_secs = 10
num_levels = 3
level_spacing_bps = 10.0
min_spread_bps = 20.0

[strategy.negrisk]
min_arb_bps = 30.0
max_legs = 8
enable_inventory_backed_short = false

[strategy.pulse_arb.runtime]
enabled = true
max_concurrent_sessions_per_asset = 2

[strategy.pulse_arb.session]
max_holding_secs = 900
min_opening_notional_usd = 250

[strategy.pulse_arb.entry]
min_net_session_edge_bps = 25

[strategy.pulse_arb.rehedge]
delta_drift_threshold = 0.03
delta_bump_mode = "relative_with_clamp"
delta_bump_ratio_bps = 1
min_abs_bump = 5
max_abs_bump = 25

[strategy.pulse_arb.pin_risk]
gamma_cap_mode = "delta_clamp"
max_abs_event_delta = 0.75
pin_risk_zone_bps = 15
pin_risk_time_window_secs = 1800

[strategy.pulse_arb.providers.deribit_primary]
kind = "deribit"
enabled = true
max_anchor_age_ms = 250
soft_mismatch_window_minutes = 360
hard_expiry_mismatch_minutes = 720

[strategy.pulse_arb.routing.btc]
enabled = true
anchor_provider = "deribit_primary"
hedge_venue = "binance_perp"

[strategy.pulse_arb.routing.eth]
enabled = true
anchor_provider = "deribit_primary"
hedge_venue = "binance_perp"

[strategy.pulse_arb.routing.sol]
enabled = false
anchor_provider = "binance_options_primary"
hedge_venue = "binance_perp"

[strategy.pulse_arb.routing.xrp]
enabled = false
anchor_provider = "binance_options_primary"
hedge_venue = "binance_perp"

[strategy.settlement]
stop_new_position_hours = 24
force_reduce_hours = 12
force_reduce_target_ratio = 0.5
close_only_hours = 6
emergency_close_hours = 1
dispute_close_only = true

[risk]
max_total_exposure_usd = 10000.0
max_single_position_usd = 200.0
max_daily_loss_usd = 500.0
max_drawdown_pct = 10.0
max_open_orders = 50
circuit_breaker_cooldown_secs = 300
rate_limit_orders_per_sec = 5
max_persistence_lag_secs = 10

[paper]
initial_capital = 10000.0

[paper_slippage]
# Slippage simulation for paper trading
poly_slippage_bps = 50      # 0.5% extra slippage for Polymarket
cex_slippage_bps = 2        # 0.02% extra slippage for CEX
min_liquidity = 100         # Minimum shares required for execution
allow_partial_fill = false  # Reject orders if liquidity insufficient

[execution_costs]
poly_fee_bps = 20
cex_taker_fee_bps = 5
cex_maker_fee_bps = 5
funding_mode = "fallback_bps"
fallback_funding_bps_per_day = 1
