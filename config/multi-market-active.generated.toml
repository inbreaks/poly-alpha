[risk]
max_total_exposure_usd = "10000"
max_single_position_usd = "200"
max_daily_loss_usd = "500"
max_drawdown_pct = "10"
max_open_orders = 50
circuit_breaker_cooldown_secs = 300
rate_limit_orders_per_sec = 5
max_persistence_lag_secs = 10

[paper]
initial_capital = 10000.0

[paper_slippage]
