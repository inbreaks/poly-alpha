order_refresh_secs = 10
num_levels = 3
level_spacing_bps = "10"
min_spread_bps = "20"

[strategy.negrisk]
min_arb_bps = "30"
max_legs = 8
enable_inventory_backed_short = false

[strategy.settlement]
